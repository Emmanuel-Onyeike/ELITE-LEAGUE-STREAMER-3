<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE LEAGUE | Backup 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #064e3b, #022c22, #000000);
            min-height: 100vh;
        }

        .sports-font { font-family: 'Syncopate', sans-serif; }
        
        .gold-glow { box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
        
        .emerald-glass {
            background: rgba(6, 78, 59, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* STRICT CENTERED MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 20px;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .vhs-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.2;
        }
    </style>
</head>
<body class="text-emerald-50 antialiased overflow-x-hidden">

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-10 py-5 rounded-full transform -translate-y-32 opacity-0 z-[2000] flex items-center gap-4 border border-emerald-400/50 shadow-[0_0_40px_rgba(16,185,129,0.4)]">
        <div class="animate-bounce"><svg class="w-6 h-6" fill="gold" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg></div>
        <span id="toastMessage" class="font-black uppercase tracking-tighter italic"></span>
    </div>

    <header class="p-8 flex justify-between items-center border-b border-emerald-500/10 bg-black/40 backdrop-blur-md sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <div id="statusIndicator" class="w-4 h-4 bg-emerald-900 rounded-full border border-emerald-500/50 transition-all duration-700"></div>
            <h1 class="sports-font text-3xl tracking-tighter uppercase italic flex items-baseline">
                ELITE <span class="text-emerald-400 ml-2">LGE</span>
            </h1>
        </div>
        <button id="loginBtn" class="text-[10px] font-black tracking-widest bg-emerald-500/10 border border-emerald-500/30 px-8 py-4 rounded-xl hover:bg-emerald-500 hover:text-black transition-all">
            ADMIN DASH
        </button>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-12 space-y-16">
        
        <section id="adminPanel" class="hidden">
            <div class="emerald-glass p-10 rounded-[4rem] border-2 border-emerald-500/20 gold-glow">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="sports-font text-2xl text-emerald-400 mb-2 italic">CONTROL HUB</h2>
                        <div class="h-1 w-24 bg-emerald-500/50 rounded-full"></div>
                    </div>
                    <button id="logoutBtn" class="text-xs font-bold text-red-400 underline hover:text-red-300">DISCONNECT</button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                    <div class="relative aspect-video bg-black rounded-[3rem] overflow-hidden border border-emerald-500/30">
                        <div id="local-player" class="w-full h-full object-cover"></div>
                        <div class="vhs-overlay"></div>
                        <div class="absolute bottom-6 right-6 bg-emerald-500 text-black px-4 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">Local Monitor</div>
                    </div>

                    <div class="flex flex-col justify-center gap-6">
                        <button id="streamToggleBtn" class="bg-emerald-500 text-black sports-font py-10 rounded-[3rem] text-3xl italic shadow-[0_20px_60px_-15px_rgba(16,185,129,0.5)] active:scale-95 transition-all">
                            START BROADCAST
                        </button>

                        <div class="grid grid-cols-2 gap-4">
                            <button id="switchCameraBtn" class="hidden bg-emerald-950/50 border border-emerald-500/20 py-6 rounded-3xl font-bold flex items-center justify-center gap-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                FLIP
                            </button>
                            <button id="pushAlertBtn" class="bg-white/5 border border-emerald-500/10 py-6 rounded-3xl font-bold text-xs uppercase tracking-widest hover:bg-white/10">
                                📢 SEND NOTIF
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="emerald-glass rounded-[5rem] p-4 border border-emerald-500/10 shadow-2xl">
            <div id="player-stage" class="aspect-video bg-black rounded-[4.5rem] flex flex-col items-center justify-center relative overflow-hidden">
                
                <div id="standby-ui" class="z-10 text-center px-10">
                    <div class="w-32 h-32 mx-auto mb-10 border-4 border-emerald-500/10 rounded-full flex items-center justify-center animate-spin-slow">
                        <svg class="w-16 h-16 text-emerald-500/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h2 class="sports-font text-5xl md:text-7xl tracking-tighter italic mb-6">STANDBY</h2>
                    <p class="text-emerald-500/60 font-bold uppercase tracking-[0.3em] text-xs">Waiting for Elite Broadcaster</p>
                </div>

                <div id="remote-player" class="absolute inset-0 w-full h-full bg-black"></div>
                
                <div id="live-tag" class="absolute top-12 left-12 hidden flex items-center gap-4 bg-emerald-500 text-black px-8 py-3 rounded-2xl z-20 shadow-2xl font-black">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                    <span class="sports-font text-sm italic">LIVE FEED</span>
                </div>
            </div>
        </div>
    </main>

    <div id="pinModal" class="modal-overlay hidden">
        <div class="bg-emerald-950 p-16 rounded-[4.5rem] border border-emerald-400/20 w-full max-w-lg text-center shadow-[0_0_100px_rgba(16,185,129,0.2)]">
            <h3 class="sports-font text-3xl mb-4 italic text-emerald-400">CREDENTIALS</h3>
            <p class="text-emerald-500/40 font-bold text-xs uppercase tracking-widest mb-10">Elite League Admin Entry</p>
            <p id="slotMessage" class="text-red-400 text-xs mb-6 hidden font-black tracking-widest">MAX ADMINS REACHED</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="w-full bg-black border border-emerald-500/20 p-8 rounded-[2rem] text-center text-6xl tracking-[0.5em] mb-10 outline-none focus:border-emerald-500 text-emerald-500 transition-all font-black">
            <button id="submitPin" class="w-full bg-emerald-500 text-black font-black py-8 rounded-[2rem] shadow-2xl active:scale-95 transition-transform text-xl uppercase tracking-tighter italic sports-font">
                VERIFY PIN
            </button>
            <button id="closePin" class="mt-10 text-emerald-800 text-xs font-black uppercase tracking-widest hover:text-emerald-500">ABORT</button>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay hidden">
        <div class="bg-emerald-50 text-emerald-950 p-16 rounded-[5rem] w-full max-w-lg text-center shadow-2xl">
            <div class="w-32 h-32 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-10">
                <svg class="w-16 h-16 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </div>
            <h3 id="alertTitle" class="sports-font text-5xl mb-6 italic tracking-tighter uppercase"></h3>
            <p id="alertMsg" class="text-emerald-800/80 mb-12 font-bold text-xl"></p>
            <button id="closeAlert" class="w-full bg-emerald-950 text-emerald-50 font-black py-8 rounded-[2.5rem] shadow-xl hover:bg-black transition-all uppercase tracking-[0.3em] text-xs">
                ACKNOWLEDGE
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsxf_2FkvyfU2QQsd_DBytd9pPi6r4o0k",
            authDomain: "learning-pro-f756e.firebaseapp.com",
            projectId: "learning-pro-f756e",
            storageBucket: "learning-pro-f756e.firebasestorage.app",
            messagingSenderId: "410163553623",
            appId: "1:410163553623:web:10fceb9616086fe9640a12",
            measurementId: "G-RXKDXG4J84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const AGORA_APP_ID = "6b0b36a41dae4815b0d440836a4fb1f6";
        const CHANNEL = "EliteLeagueFinals-Backup2";
        const ADMIN_PIN = "2026";
        const MAX_ADMINS = 4;

        const viewerClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
        let hostClient = null;
        let localTracks = { audioTrack: null, videoTrack: null };
        let isStreaming = false;
        let currentFacingMode = "user";

        const openModal = id => document.getElementById(id)?.classList.remove('hidden');
        const closeModal = id => document.getElementById(id)?.classList.add('hidden');

        const showToast = (msg, duration = 5000) => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.remove('-translate-y-32', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => toast.classList.add('-translate-y-32', 'opacity-0'), duration);
        };

        const verifyAdmin = () => {
            const pin = document.getElementById('pinInput')?.value;
            const slotMsg = document.getElementById('slotMessage');
            if (pin !== ADMIN_PIN) {
                alert("Wrong PIN");
                document.getElementById('pinInput').value = "";
                return;
            }
            runTransaction(ref(db, 'adminsLive'), (count) => {
                count = count || 0;
                if (count >= MAX_ADMINS) {
                    slotMsg?.classList.remove('hidden');
                    return count;
                }
                return count + 1;
            }).then(r => {
                if (r.committed) {
                    closeModal('pinModal');
                    document.getElementById('adminPanel')?.classList.remove('hidden');
                    document.getElementById('loginBtn').innerText = "ONLINE";
                    document.getElementById('loginBtn').classList.add('bg-emerald-500', 'text-black');
                    showToast("ELITE ACCESS GRANTED");
                }
            });
        };

        const toggleStream = async () => {
            const btn = document.getElementById('streamToggleBtn');
            const switchBtn = document.getElementById('switchCameraBtn');
            if (!isStreaming) {
                try {
                    hostClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
                    hostClient.setClientRole("host");
                    await hostClient.join(AGORA_APP_ID, CHANNEL, null, null);
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                        encoderConfig: "480p_1",
                        facingMode: currentFacingMode
                    });
                    localTracks.videoTrack.play("local-player");
                    await hostClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
                    isStreaming = true;
                    btn.innerText = "OFF AIR";
                    btn.classList.add('bg-red-600', 'text-white');
                    switchBtn?.classList.remove('hidden');
                    document.getElementById('statusIndicator').classList.add('bg-emerald-400', 'gold-glow');
                } catch (e) { alert("Error: " + e.message); }
            } else { location.reload(); }
        };

        const switchCamera = async () => {
            if (!isStreaming || !localTracks.videoTrack) return;
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            const newTrack = await AgoraRTC.createCameraVideoTrack({
                encoderConfig: "480p_1",
                facingMode: currentFacingMode
            });
            await hostClient.unpublish(localTracks.videoTrack);
            localTracks.videoTrack.close();
            localTracks.videoTrack = newTrack;
            localTracks.videoTrack.play("local-player");
            await hostClient.publish(localTracks.videoTrack);
            showToast(`CAMERA ROTATED: ${currentFacingMode.toUpperCase()}`);
        };

        const sendPushAlert = () => {
            set(ref(db, 'globalAlert/latest'), {
                title: "GO LIVE! 🏆",
                message: "ELITE LEAGUE FINALS ARE STARTING. TUNE IN.",
                timestamp: Date.now()
            });
            showToast("ALERTS BROADCASTED");
        };

        onValue(ref(db, 'globalAlert/latest'), snap => {
            const data = snap.val();
            if (data && Date.now() - data.timestamp < 300000) {
                document.getElementById('alertTitle').innerText = data.title;
                document.getElementById('alertMsg').innerText = data.message;
                openModal('alertModal');
            }
        });

        async function initViewer() {
            try {
                viewerClient.setClientRole("audience");
                await viewerClient.join(AGORA_APP_ID, CHANNEL, null, null);
                viewerClient.on("user-published", async (user, mediaType) => {
                    await viewerClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('standby-ui')?.classList.add('hidden');
                        document.getElementById('statusIndicator')?.classList.add('bg-emerald-400');
                        document.getElementById('live-tag')?.classList.remove('hidden');
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            } catch (e) {}
        }

        document.addEventListener("DOMContentLoaded", () => {
            initViewer();
            document.getElementById('loginBtn')?.addEventListener('click', () => openModal('pinModal'));
            document.getElementById('submitPin')?.addEventListener('click', verifyAdmin);
            document.getElementById('closePin')?.addEventListener('click', () => closeModal('pinModal'));
            document.getElementById('pushAlertBtn')?.addEventListener('click', sendPushAlert);
            document.getElementById('streamToggleBtn')?.addEventListener('click', toggleStream);
            document.getElementById('switchCameraBtn')?.addEventListener('click', switchCamera);
            document.getElementById('closeAlert')?.addEventListener('click', () => closeModal('alertModal'));
            document.getElementById('logoutBtn')?.addEventListener('click', () => location.reload());
        });
    </script>
</body>
</html>
