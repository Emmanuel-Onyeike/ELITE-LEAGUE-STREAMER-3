<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE LEAGUE | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        /* Mobile Performance Optimizations */
        body { 
            background: #020617; 
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Centered Modal - Strictly Following Instructions */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 20px;
        }

        /* Ensure the video player stays within mobile bounds */
        #remote-player video, #local-player video {
            object-fit: cover !important;
            border-radius: 24px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-white overflow-hidden">

    <header class="h-16 flex justify-between items-center px-5 border-b border-white/10 bg-black/40">
        <div class="flex items-center gap-3">
            <div id="statusIndicator" class="w-2.5 h-2.5 bg-gray-600 rounded-full"></div>
            <span class="font-black tracking-tighter text-lg uppercase italic">ELITE <span class="text-blue-500">LGE</span></span>
        </div>
        <button id="loginBtn" class="text-[10px] font-bold bg-white/5 px-4 py-2 rounded-full border border-white/10 uppercase">Admin</button>
    </header>

    <main class="h-[calc(100vh-64px)] flex flex-col p-4 gap-4">
        
        <div class="relative w-full aspect-video md:aspect-[16/9] bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/5">
            
            <div id="remote-player" class="absolute inset-0 w-full h-full z-0"></div>

            <div id="standby-ui" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-10 bg-slate-900/50">
                <div class="w-12 h-12 mb-4 border-2 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
                <h2 class="text-xl font-black italic tracking-tighter">WAITING FOR FEED...</h2>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Main Court Live</p>
            </div>

            <div id="live-tag" class="absolute top-4 left-4 hidden bg-red-600 px-3 py-1.5 rounded-full flex items-center gap-2 z-20 shadow-lg">
                <div class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></div>
                <span class="text-[9px] font-black uppercase tracking-widest">LIVE</span>
            </div>
        </div>

        <div id="adminPanel" class="hidden flex-1 overflow-y-auto space-y-4 animate-in slide-in-from-bottom-5">
            <div class="glass-panel p-5 rounded-3xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black text-blue-400 uppercase tracking-widest">Broadcaster Hub</h3>
                    <button id="logoutBtn" class="text-[10px] text-red-500 font-bold">LOGOUT</button>
                </div>
                
                <div class="w-full aspect-video bg-black rounded-2xl mb-4 relative overflow-hidden border border-white/10">
                    <div id="local-player" class="w-full h-full"></div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button id="streamToggleBtn" class="bg-blue-600 font-black py-4 rounded-2xl text-lg uppercase tracking-tight shadow-lg active:scale-95 transition-transform">
                        Go Live to School
                    </button>
                    <div class="flex gap-2">
                        <button id="switchCameraBtn" class="hidden flex-1 bg-white/10 py-4 rounded-2xl font-bold text-sm">🔄 Switch</button>
                        <button id="pushAlertBtn" class="flex-1 bg-white/5 py-4 rounded-2xl font-bold text-sm">📢 Notify</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="viewer-info" class="flex-1 glass-panel p-6 rounded-3xl flex flex-col items-center justify-center text-center">
            <h3 class="text-blue-500 font-black text-sm uppercase tracking-[0.2em] mb-2">Elite League Finals</h3>
            <p class="text-xs text-gray-500 leading-relaxed italic">The live feed will automatically start when the tournament administrator begins broadcasting.</p>
        </div>
    </main>

    <div id="pinModal" class="modal-overlay hidden">
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 w-full max-w-[320px] text-center shadow-2xl">
            <h3 class="text-xl font-black mb-6 uppercase tracking-tighter italic">Enter Admin PIN</h3>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="w-full bg-black border border-white/10 p-5 rounded-2xl text-center text-4xl tracking-[0.4em] mb-6 outline-none focus:border-blue-500 text-blue-500 font-mono">
            <button id="submitPin" class="w-full bg-blue-600 font-black py-4 rounded-2xl shadow-xl text-lg">ACCESS</button>
            <button id="closePin" class="mt-4 text-gray-600 text-[10px] font-bold uppercase tracking-widest">Close</button>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay hidden">
        <div class="bg-white text-black p-8 rounded-[2.5rem] w-full max-w-[300px] text-center">
            <div id="alertIcon" class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </div>
            <h3 id="alertTitle" class="text-2xl font-black mb-2 uppercase tracking-tighter italic"></h3>
            <p id="alertMsg" class="text-gray-600 mb-8 font-bold text-sm leading-snug"></p>
            <button id="closeAlert" class="w-full bg-black text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsxf_2FkvyfU2QQsd_DBytd9pPi6r4o0k",
            authDomain: "learning-pro-f756e.firebaseapp.com",
            projectId: "learning-pro-f756e",
            storageBucket: "learning-pro-f756e.firebasestorage.app",
            messagingSenderId: "410163553623",
            appId: "1:410163553623:web:10fceb9616086fe9640a12",
            measurementId: "G-RXKDXG4J84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const AGORA_APP_ID = "6b0b36a41dae4815b0d440836a4fb1f6";
        const CHANNEL = "EliteLeagueFinals-Backup1";
        const ADMIN_PIN = "2026";

        const viewerClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
        let hostClient = null;
        let localTracks = { audioTrack: null, videoTrack: null };
        let isStreaming = false;

        const openModal = id => document.getElementById(id).classList.remove('hidden');
        const closeModal = id => document.getElementById(id).classList.add('hidden');

        // Admin Logic
        const verifyAdmin = () => {
            if (document.getElementById('pinInput').value === ADMIN_PIN) {
                closeModal('pinModal');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('viewer-info').classList.add('hidden');
                document.getElementById('loginBtn').innerText = "ONLINE";
            } else {
                alert("Incorrect PIN");
            }
        };

        const toggleStream = async () => {
            const btn = document.getElementById('streamToggleBtn');
            if (!isStreaming) {
                try {
                    hostClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
                    hostClient.setClientRole("host");
                    await hostClient.join(AGORA_APP_ID, CHANNEL, null, null);
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "360p_7" }); // 360p is much smoother for mobile data
                    localTracks.videoTrack.play("local-player");
                    await hostClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
                    isStreaming = true;
                    btn.innerText = "END FEED";
                    btn.classList.add('bg-red-600');
                    document.getElementById('switchCameraBtn').classList.remove('hidden');
                } catch (e) { alert("Camera failed: " + e.message); }
            } else { location.reload(); }
        };

        // Notification Logic
        onValue(ref(db, 'globalAlert/latest'), snap => {
            const data = snap.val();
            if (data && Date.now() - data.timestamp < 60000) {
                document.getElementById('alertTitle').innerText = data.title;
                document.getElementById('alertMsg').innerText = data.message;
                openModal('alertModal');
            }
        });

        // Viewer Logic
        async function initViewer() {
            try {
                viewerClient.setClientRole("audience");
                await viewerClient.join(AGORA_APP_ID, CHANNEL, null, null);
                viewerClient.on("user-published", async (user, mediaType) => {
                    await viewerClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('standby-ui').classList.add('hidden');
                        document.getElementById('live-tag').classList.remove('hidden');
                        document.getElementById('statusIndicator').classList.add('bg-blue-500');
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            } catch (e) {}
        }

        // DOM Setup
        document.addEventListener("DOMContentLoaded", () => {
            initViewer();
            document.getElementById('loginBtn').onclick = () => openModal('pinModal');
            document.getElementById('submitPin').onclick = verifyAdmin;
            document.getElementById('closePin').onclick = () => closeModal('pinModal');
            document.getElementById('closeAlert').onclick = () => closeModal('alertModal');
            document.getElementById('streamToggleBtn').onclick = toggleStream;
            document.getElementById('pushAlertBtn').onclick = () => {
                set(ref(db, 'globalAlert/latest'), { title: "GO LIVE! 🏆", message: "Elite Finals are starting!", timestamp: Date.now() });
            };
        });
    </script>
</body>
</html>
