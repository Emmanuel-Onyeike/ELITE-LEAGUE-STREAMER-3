<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE LEAGUE | Live Finals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .blue-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* MODAL AT THE CENTER - AS REQUESTED */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.98);
            z-index: 1000;
            padding: 20px;
        }

        #toast {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.4);
        }

        #remote-player video, #local-player video {
            object-fit: cover !important;
        }
    </style>
</head>
<body class="text-slate-100 antialiased overflow-x-hidden">

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-4 rounded-2xl transform -translate-y-24 opacity-0 z-[2000] flex items-center gap-3 max-w-[90%] border border-blue-400/50">
        <span id="toastMessage" class="text-xs font-bold uppercase"></span>
    </div>

    <header class="h-16 flex justify-between items-center px-6 border-b border-white/5 bg-black/20 backdrop-blur-xl sticky top-0 z-40">
        <div class="flex items-center space-x-3">
            <div id="statusIndicator" class="w-3 h-3 bg-slate-600 rounded-full transition-all"></div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">
                ELITE <span class="text-blue-500">LEAGUE</span>
            </h1>
        </div>
        <button id="loginBtn" class="text-[10px] font-black bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-full hover:bg-blue-600 transition-all">
            ADMIN
        </button>
    </header>

    <main class="flex flex-col p-4 gap-4 max-w-2xl mx-auto">
        
        <section id="adminPanel" class="hidden animate-in fade-in slide-in-from-top-4 duration-500">
            <div class="blue-glass p-5 rounded-[2.5rem] border border-blue-500/20">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Broadcaster Hub</span>
                    <button id="logoutBtn" class="text-[10px] text-red-400 font-bold uppercase">Logout</button>
                </div>

                <div class="relative aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 mb-4">
                    <div id="local-player" class="w-full h-full"></div>
                    <div class="absolute top-3 left-3 bg-black/60 px-2 py-1 rounded text-[8px] font-bold text-blue-400">PREVIEW</div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="streamToggleBtn" class="bg-blue-600 text-white font-black py-5 rounded-2xl uppercase tracking-tighter text-xl active:scale-95 transition-transform shadow-lg shadow-blue-600/20">
                        Go Live to School
                    </button>
                    <div class="flex gap-2">
                        <button id="switchCameraBtn" class="hidden flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2">
                            🔄 Switch Cam
                        </button>
                        <button id="pushAlertBtn" class="flex-1 bg-white/5 hover:bg-white/10 py-4 rounded-2xl font-bold text-sm border border-white/5">
                            📢 Notify All
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="blue-glass rounded-[3rem] overflow-hidden border border-blue-500/10 shadow-2xl">
            <div id="player-stage" class="aspect-video bg-black flex flex-col items-center justify-center relative">
                
                <div id="standby-ui" class="z-10 text-center animate-pulse">
                    <div class="mb-4 text-blue-500/30">
                        <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black italic tracking-tighter text-slate-400">WAITING FOR FEED</h2>
                </div>

                <div id="remote-player" class="absolute inset-0 w-full h-full bg-black z-0"></div>
                
                <div id="live-tag" class="absolute top-5 left-5 hidden flex items-center gap-2 bg-red-600 text-white px-3 py-1.5 rounded-full z-20 shadow-xl">
                    <div class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></div>
                    <span class="text-[9px] font-black uppercase tracking-widest">LIVE</span>
                </div>
            </div>

            <div class="px-8 py-5 bg-blue-950/20 text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-relaxed">Elite League Official Main Court Feed</p>
            </div>
        </div>
    </main>

    <div id="pinModal" class="modal-overlay hidden">
        <div class="bg-slate-900 p-10 rounded-[3rem] border border-blue-500/20 w-full max-w-xs text-center shadow-2xl">
            <h3 class="text-xl font-black mb-2 uppercase tracking-tighter">Admin Login</h3>
            <p class="text-slate-500 text-[10px] mb-6 font-bold uppercase tracking-widest">Enter Secure PIN</p>
            <p id="slotMessage" class="text-red-400 text-[10px] mb-4 hidden font-black">SLOTS FULL (MAX 4)</p>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••" class="w-full bg-black border border-white/10 p-5 rounded-2xl text-center text-4xl tracking-[0.4em] mb-6 outline-none focus:border-blue-500 text-blue-500 transition-all">
            <button id="submitPin" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform text-sm uppercase">Access Panel</button>
            <button id="closePin" class="mt-6 text-slate-600 text-[10px] font-black uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay hidden">
        <div class="bg-white text-blue-950 p-10 rounded-[3rem] w-full max-w-xs text-center shadow-2xl">
            <h3 id="alertTitle" class="text-2xl font-black mb-2 uppercase tracking-tighter italic"></h3>
            <p id="alertMsg" class="text-slate-600 mb-8 font-bold text-xs leading-relaxed"></p>
            <button id="closeAlert" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-colors uppercase tracking-widest text-[10px]">Return to Viewer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsxf_2FkvyfU2QQsd_DBytd9pPi6r4o0k",
            authDomain: "learning-pro-f756e.firebaseapp.com",
            projectId: "learning-pro-f756e",
            storageBucket: "learning-pro-f756e.firebasestorage.app",
            messagingSenderId: "410163553623",
            appId: "1:410163553623:web:10fceb9616086fe9640a12",
            measurementId: "G-RXKDXG4J84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const AGORA_APP_ID = "6b0b36a41dae4815b0d440836a4fb1f6";
        const CHANNEL = "EliteLeagueFinals-Backup1";
        const ADMIN_PIN = "2026";
        const MAX_ADMINS = 4;

        const viewerClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
        let hostClient = null;
        let localTracks = { audioTrack: null, videoTrack: null };
        let isStreaming = false;
        let currentFacingMode = "user";

        const openModal = id => document.getElementById(id)?.classList.remove('hidden');
        const closeModal = id => document.getElementById(id)?.classList.add('hidden');

        const showToast = (msg, duration = 4000) => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => toast.classList.add('-translate-y-24', 'opacity-0'), duration);
        };

        const verifyAdmin = () => {
            const pin = document.getElementById('pinInput')?.value;
            const slotMsg = document.getElementById('slotMessage');

            if (pin !== ADMIN_PIN) {
                showToast("WRONG PIN");
                document.getElementById('pinInput').value = "";
                return;
            }

            runTransaction(ref(db, 'adminsLive'), (count) => {
                count = count || 0;
                if (count >= MAX_ADMINS) {
                    slotMsg?.classList.remove('hidden');
                    return count;
                }
                return count + 1;
            }).then(r => {
                if (r.committed) {
                    closeModal('pinModal');
                    document.getElementById('adminPanel')?.classList.remove('hidden');
                    document.getElementById('loginBtn').innerText = "ONLINE";
                    document.getElementById('loginBtn').classList.add('bg-blue-600', 'text-white');
                    showToast("ADMIN ACCESS GRANTED");
                }
            });
        };

        const toggleStream = async () => {
            const btn = document.getElementById('streamToggleBtn');
            const switchBtn = document.getElementById('switchCameraBtn');

            if (!isStreaming) {
                try {
                    hostClient = AgoraRTC.createClient({ mode: "live", codec: "h264" });
                    hostClient.setClientRole("host");
                    await hostClient.join(AGORA_APP_ID, CHANNEL, null, null);
                    
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                        encoderConfig: "360p_7",
                        facingMode: currentFacingMode
                    });
                    
                    localTracks.videoTrack.play("local-player");
                    await hostClient.publish([localTracks.audioTrack, localTracks.videoTrack]);
                    
                    isStreaming = true;
                    btn.innerText = "STOP FEED";
                    btn.classList.add('bg-red-600');
                    switchBtn?.classList.remove('hidden');
                    document.getElementById('statusIndicator').classList.add('bg-blue-500');
                } catch (e) { alert("Camera failed: " + e.message); }
            } else {
                location.reload(); 
            }
        };

        // FIXED CAMERA SWITCH LOGIC
        const switchCamera = async () => {
            if (!isStreaming || !localTracks.videoTrack) return;
            try {
                currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
                const newTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: "360p_7",
                    facingMode: currentFacingMode
                });

                await hostClient.unpublish(localTracks.videoTrack);
                localTracks.videoTrack.stop();
                localTracks.videoTrack.close();
                
                localTracks.videoTrack = newTrack;
                localTracks.videoTrack.play("local-player");
                await hostClient.publish(localTracks.videoTrack);
                
                showToast(`SWITCHED TO ${currentFacingMode.toUpperCase()} CAMERA`);
            } catch (e) {
                showToast("SWITCH FAILED");
            }
        };

        const sendPushAlert = () => {
            set(ref(db, 'globalAlert/latest'), {
                title: "GAME BEGUN! 🏆",
                message: "Finals are starting now! Join the live stream.",
                timestamp: Date.now()
            });
            showToast("ALERTS SENT");
        };

        onValue(ref(db, 'globalAlert/latest'), snap => {
            const data = snap.val();
            if (data && Date.now() - data.timestamp < 300000) {
                document.getElementById('alertTitle').innerText = data.title;
                document.getElementById('alertMsg').innerText = data.message;
                openModal('alertModal');
            }
        });

        async function initViewer() {
            try {
                viewerClient.setClientRole("audience");
                await viewerClient.join(AGORA_APP_ID, CHANNEL, null, null);
                viewerClient.on("user-published", async (user, mediaType) => {
                    await viewerClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('standby-ui')?.classList.add('hidden');
                        document.getElementById('statusIndicator')?.classList.add('bg-blue-500');
                        document.getElementById('live-tag')?.classList.remove('hidden');
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
                
                viewerClient.on("user-unpublished", () => {
                    document.getElementById('standby-ui')?.classList.remove('hidden');
                    document.getElementById('live-tag')?.classList.add('hidden');
                    document.getElementById('statusIndicator')?.classList.remove('bg-blue-500');
                });
            } catch (e) {}
        }

        document.addEventListener("DOMContentLoaded", () => {
            initViewer();
            document.getElementById('loginBtn')?.addEventListener('click', () => openModal('pinModal'));
            document.getElementById('submitPin')?.addEventListener('click', verifyAdmin);
            document.getElementById('closePin')?.addEventListener('click', () => closeModal('pinModal'));
            document.getElementById('pushAlertBtn')?.addEventListener('click', sendPushAlert);
            document.getElementById('streamToggleBtn')?.addEventListener('click', toggleStream);
            document.getElementById('switchCameraBtn')?.addEventListener('click', switchCamera);
            document.getElementById('closeAlert')?.addEventListener('click', () => closeModal('alertModal'));
            document.getElementById('logoutBtn')?.addEventListener('click', () => location.reload());
        });
    </script>
</body>
</html>
